<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socket.IO Notification Tester</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 16px;
        }

        .container {
            width: 100%;
            max-width: 560px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: #f8fafc;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 24px;
        }

        /* --- Status Indicator --- */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            padding: 10px 14px;
            background: #1e293b;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ef4444;
            transition: background 0.3s;
        }

        .status-dot.connected { background: #22c55e; }

        .status-text { color: #94a3b8; }

        /* --- Controls --- */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 24px;
        }

        .token-input {
            width: 100%;
            padding: 10px 14px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 0.9rem;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: border-color 0.2s;
        }

        .token-input:focus { border-color: #6366f1; }

        .token-input::placeholder { color: #475569; }

        .btn-row {
            display: flex;
            gap: 8px;
        }

        button {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:active { transform: scale(0.97); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-connect { background: #22c55e; color: #052e16; }
        .btn-disconnect { background: #ef4444; color: #fff; }
        .btn-clear { background: #334155; color: #94a3b8; }

        /* --- Error --- */
        .error-msg {
            padding: 10px 14px;
            background: #451a1a;
            border: 1px solid #7f1d1d;
            border-radius: 8px;
            color: #fca5a5;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
        }

        .error-msg.visible { display: block; }

        /* --- Notifications --- */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #94a3b8;
        }

        .badge {
            background: #6366f1;
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 12px;
            min-width: 24px;
            text-align: center;
        }

        .notification-list {
            max-height: 460px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
        }

        .notification-list::-webkit-scrollbar { width: 4px; }
        .notification-list::-webkit-scrollbar-track { background: transparent; }
        .notification-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

        .empty-state {
            text-align: center;
            padding: 48px 0;
            color: #475569;
            font-size: 0.85rem;
        }

        /* --- Notification Card --- */
        .notification-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 14px 16px;
            animation: fadeSlideIn 0.35s ease-out;
        }

        .notification-card .type-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 6px;
        }

        .type-booking  { background: #164e63; color: #67e8f9; }
        .type-cancel   { background: #451a1a; color: #fca5a5; }
        .type-reschedule { background: #422006; color: #fdba74; }
        .type-default  { background: #1e1b4b; color: #a5b4fc; }

        .notification-card .message {
            font-size: 0.88rem;
            color: #cbd5e1;
            line-height: 1.45;
            margin-bottom: 6px;
        }

        .notification-card .time {
            font-size: 0.75rem;
            color: #475569;
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* --- Log --- */
        .log-section {
            margin-top: 24px;
        }

        .log-box {
            max-height: 140px;
            overflow-y: auto;
            background: #0c0f1a;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 10px 12px;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            color: #64748b;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔔 Notification Tester</h1>
        <p class="subtitle">Real-time Socket.IO notification debugger</p>

        <!-- Status -->
        <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">Disconnected</span>
        </div>

        <!-- Error -->
        <div class="error-msg" id="errorMsg"></div>

        <!-- Controls -->
        <div class="controls">
            <input
                type="text"
                class="token-input"
                id="tokenInput"
                placeholder="Paste your JWT access token here..."
            />
            <div class="btn-row">
                <button class="btn-connect" id="btnConnect" onclick="connectSocket()">
                    Connect
                </button>
                <button class="btn-disconnect" id="btnDisconnect" onclick="disconnectSocket()" disabled>
                    Disconnect
                </button>
                <button class="btn-clear" onclick="clearNotifications()">
                    Clear
                </button>
            </div>
        </div>

        <!-- Notifications -->
        <div class="section-header">
            <span class="section-title">Notifications</span>
            <span class="badge" id="countBadge">0</span>
        </div>
        <div class="notification-list" id="notificationList">
            <div class="empty-state" id="emptyState">
                Waiting for notifications...
            </div>
        </div>

        <!-- Debug Log -->
        <div class="log-section">
            <div class="section-header">
                <span class="section-title">Debug Log</span>
            </div>
            <div class="log-box" id="logBox"></div>
        </div>
    </div>

    <script>
        let socket = null;
        let notificationCount = 0;

        const $ = (id) => document.getElementById(id);

        // ——— Logging ———
        function log(msg, type = "info") {
            const time = new Date().toLocaleTimeString();
            const prefix = { info: "ℹ️", ok: "✅", err: "❌", event: "⚡" }[type] || "ℹ️";
            const line = document.createElement("div");
            line.textContent = `[${time}] ${prefix} ${msg}`;
            $("logBox").prepend(line);
            console.log(`[${type.toUpperCase()}]`, msg);
        }

        // ——— Status ———
        function setStatus(connected) {
            $("statusDot").classList.toggle("connected", connected);
            $("statusText").textContent = connected ? "Connected" : "Disconnected";
            $("btnConnect").disabled = connected;
            $("btnDisconnect").disabled = !connected;
            $("tokenInput").disabled = connected;
        }

        // ——— Error ———
        function showError(msg) {
            const el = $("errorMsg");
            el.textContent = msg;
            el.classList.add("visible");
            setTimeout(() => el.classList.remove("visible"), 6000);
        }

        // ——— Connect ———
        function connectSocket() {
            const token = $("tokenInput").value.trim();

            if (!token) {
                showError("Please paste a JWT token first.");
                return;
            }

            log("Connecting to ws://localhost:5000 ...");

            socket = io("http://localhost:5000", {
                auth: { token },
                transports: ["websocket", "polling"],
            });

            socket.on("connect", () => {
                log(`Connected — socket id: ${socket.id}`, "ok");
                setStatus(true);
            });

            socket.on("connect_error", (err) => {
                log(`Connection failed: ${err.message}`, "err");
                showError(err.message);
                setStatus(false);
                socket.disconnect();
                socket = null;
            });

            socket.on("disconnect", (reason) => {
                log(`Disconnected — reason: ${reason}`, "err");
                setStatus(false);
            });

            socket.on("forceDisconnect", (data) => {
                log(`Force disconnected: ${data.message}`, "err");
                showError(data.message);
            });

            // ——— Listen for notifications ———
            socket.on("newNotification", (notification) => {
                log(`Notification received: [${notification.type}] ${notification.message}`, "event");
                addNotificationCard(notification);
            });
        }

        // ——— Disconnect ———
        function disconnectSocket() {
            if (socket) {
                socket.disconnect();
                socket = null;
                log("Manually disconnected.", "info");
                setStatus(false);
            }
        }

        // ——— Add Card ———
        function addNotificationCard(n) {
            $("emptyState").style.display = "none";

            const typeClass = {
                booking: "type-booking",
                cancel: "type-cancel",
                reschedule: "type-reschedule",
            }[n.type] || "type-default";

            const card = document.createElement("div");
            card.className = "notification-card";

            const time = n.createdAt
                ? new Date(n.createdAt).toLocaleString()
                : new Date().toLocaleString();

            card.innerHTML = `
                <span class="type-badge ${typeClass}">${n.type || "notification"}</span>
                <div class="message">${n.message}</div>
                <div class="time">${time}</div>
            `;

            $("notificationList").prepend(card);
            notificationCount++;
            $("countBadge").textContent = notificationCount;
        }

        // ——— Clear ———
        function clearNotifications() {
            $("notificationList").innerHTML =
                '<div class="empty-state" id="emptyState">Waiting for notifications...</div>';
            notificationCount = 0;
            $("countBadge").textContent = "0";
            log("Notifications cleared.", "info");
        }
    </script>
</body>
</html>
